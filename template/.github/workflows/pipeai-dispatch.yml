# PipeAI 파이프라인 워크플로우
# WHY: Claude=파일 생성/수정만 담당, git push는 워크플로우가 직접 실행
# 출처: HSD-9, HSD-13에서 발견된 git push 실패 문제 해결 패턴
name: PipeAI Dispatch

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: "PipeAI 이슈 ID"
        required: true
      task:
        description: "작업 내용"
        required: true
      issue_type:
        description: "이슈 유형 (CODE_FIX | ANALYSIS)"
        required: true
        default: "CODE_FIX"
      callback_url:
        description: "PipeAI 상태 보고 URL"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 작업 유형 판단
        id: task_type
        run: |
          if [ "${{ inputs.issue_type }}" = "ANALYSIS" ]; then
            echo "max_turns=50" >> $GITHUB_OUTPUT
            echo "label=분석" >> $GITHUB_OUTPUT
            # WHY: ANALYSIS C안 템플릿 강제 — paperclip-split 자동 추출 패턴과 일치
            cat >> $GITHUB_OUTPUT << 'RULES'
          instructions<<INST_EOF
          - docs/ANALYSIS-${{ inputs.issue_id }}.md 파일만 생성하세요. 코드 수정 금지.
          - ANALYSIS 문서 마지막에 반드시 아래 형식의 "후속 작업 목록" 섹션을 포함하세요:

            ## 후속 작업 목록

            ### P0 — Critical
            - [ ] **[카테고리] 작업 제목**
              - 파일: `경로/파일명`
              - 설명: 구체적 설명

            ### P1 — High (이하 동일 형식)

          - 각 항목은 반드시 `- [ ] **[카테고리] 제목**` 형식이어야 합니다. 이 패턴으로 자동 추출됩니다.
          INST_EOF
          RULES
          else
            echo "max_turns=30" >> $GITHUB_OUTPUT
            echo "label=코드 수정" >> $GITHUB_OUTPUT
            cat >> $GITHUB_OUTPUT << 'RULES'
          instructions<<INST_EOF
          - 필요한 코드를 수정하세요.
          INST_EOF
          RULES
          fi

      - name: 상태 보고 — 진행 중
        run: |
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ secrets.PIPELINE_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "issue_id": "${{ inputs.issue_id }}",
              "status": "IN_PROGRESS",
              "pipeline_stage": "${{ inputs.issue_type == 'ANALYSIS' && 'ANALYZING' || 'CODING' }}"
            }'

      - name: Claude Code 실행
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ inputs.task }}

            ## 중요 규칙
            - git add, git commit, git push 명령을 절대 실행하지 마세요. 파일 생성/수정만 하세요.
            - git 관련 작업은 워크플로우가 자동 처리합니다.
            ${{ steps.task_type.outputs.instructions }}
          max_turns: ${{ steps.task_type.outputs.max_turns }}

      # WHY: Claude가 git push를 안 하므로 워크플로우에서 직접 처리
      - name: 변경사항 확인
        id: check_changes
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Git commit + push (retry 3회)
        id: git_push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          BRANCH="pipeai/issue-${{ inputs.issue_id }}"
          git checkout -b "$BRANCH"

          git config user.name "PipeAI"
          git config user.email "bot@pipeai.dev"
          git add -A
          git commit -m "${{ steps.task_type.outputs.label }}: ${{ inputs.task }}"

          # WHY: git push retry 3회 — 지수 백오프 (2s→4s→8s)
          PUSH_SUCCESS=false
          for i in 1 2 3; do
            if git push origin "$BRANCH" 2>&1; then
              PUSH_SUCCESS=true
              break
            fi
            DELAY=$((2 ** i))
            echo "push 실패 (시도 $i/3), ${DELAY}초 후 재시도..."
            sleep $DELAY
          done

          if [ "$PUSH_SUCCESS" = "true" ]; then
            echo "push_success=true" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          else
            echo "push_success=false" >> $GITHUB_OUTPUT
            echo "::error::git push 3회 실패"
            exit 1
          fi

      - name: PR 생성
        id: create_pr
        if: steps.git_push.outputs.push_success == 'true'
        run: |
          BRANCH="${{ steps.git_push.outputs.branch }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          if [ "${{ inputs.issue_type }}" = "ANALYSIS" ]; then
            # WHY: 분석 작업은 승인 없이 자동 머지
            PR_URL=$(gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH" \
              --title "[PipeAI] 분석: ${{ inputs.task }}" \
              --body "PipeAI 자동 분석 결과입니다. 자동 머지됩니다." \
              --json url -q '.url')

            gh pr merge "$PR_URL" --squash --auto
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "auto_merged=true" >> $GITHUB_OUTPUT
          else
            PR_URL=$(gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH" \
              --title "[PipeAI] ${{ inputs.task }}" \
              --body "PipeAI가 생성한 PR입니다. 검토 후 머지해주세요." \
              --json url -q '.url')

            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "auto_merged=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # WHY: 실패 분기 세분화 — push 실패 / 변경사항 없음 / Claude 실패를 구분
      - name: 상태 보고 — 완료
        if: always()
        run: |
          HAS_CHANGES="${{ steps.check_changes.outputs.has_changes }}"
          PUSH_SUCCESS="${{ steps.git_push.outputs.push_success }}"
          AUTO_MERGED="${{ steps.create_pr.outputs.auto_merged }}"
          PR_URL="${{ steps.create_pr.outputs.pr_url }}"
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"
          JOB_STATUS="${{ job.status }}"

          report() {
            curl -s -X POST "${{ inputs.callback_url }}" \
              -H "Authorization: Bearer ${{ secrets.PIPELINE_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "$1"
          }

          if [ "$HAS_CHANGES" = "false" ]; then
            # 변경사항 없음
            report "{
              \"issue_id\": \"${{ inputs.issue_id }}\",
              \"status\": \"CLOSED\",
              \"pipeline_stage\": \"FAILED\",
              \"close_reason\": \"WONT_FIX\"
            }"
          elif [ "$PUSH_SUCCESS" != "true" ]; then
            # git push 실패
            report "{
              \"issue_id\": \"${{ inputs.issue_id }}\",
              \"status\": \"CLOSED\",
              \"pipeline_stage\": \"FAILED\",
              \"close_reason\": \"PIPELINE_FAILED\"
            }"
          elif [ "$AUTO_MERGED" = "true" ]; then
            # 분석 자동 머지 완료
            report "{
              \"issue_id\": \"${{ inputs.issue_id }}\",
              \"status\": \"MERGED\",
              \"pipeline_stage\": \"MERGED\",
              \"pr_url\": \"$PR_URL\"
            }"
          elif [ -n "$PR_URL" ]; then
            # 코드 수정 PR 생성 → 리뷰 대기
            report "{
              \"issue_id\": \"${{ inputs.issue_id }}\",
              \"status\": \"PR_CREATED\",
              \"pipeline_stage\": \"PR_REVIEW\",
              \"pr_url\": \"$PR_URL\",
              \"pr_number\": $PR_NUMBER
            }"
          else
            # 기타 실패 (Claude 실행 에러 등)
            report "{
              \"issue_id\": \"${{ inputs.issue_id }}\",
              \"status\": \"CLOSED\",
              \"pipeline_stage\": \"FAILED\",
              \"close_reason\": \"PIPELINE_FAILED\"
            }"
          fi
